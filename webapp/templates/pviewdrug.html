
{% extends 'p_base.html' %}
{% block content %}
<center>
	<font size="" color="#ff0000"><strong>{{msg}}</strong></font>
	<br><br>
<h2>Add Stock</h2>
<br><br>

<table width="100%" id="tab" >
<tr><th>ID<th>Drug Name<th>Medicine Name<th>Type<th>Cost<th>MRP<th>
{% for d1 in data %}


<TR><TD>{{d1.did}}<TD>{{d1.drugname}}<TD>{{d1.mname}}<TD>{{d1.typ_e}}<TD>{{d1.cost}} Rs/-<TD>{{d1.mrp}} Rs/-
<td width="20%">


	<h4>Add Stock</h6>
	<form method="get" action="/addtocart_p/">
	<input type="number" name="count" max="{{d1.stock}}" min='1'>
	<input type="hidden" name="did" value="{{d1.did}}" >


		<input type="submit" value="Add Stock">
	</form>


		
{% endfor %}

</table>





{% endblock %}
